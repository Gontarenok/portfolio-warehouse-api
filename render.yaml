services:
  - type: web
    name: warehouse-api
    runtime: docker
    plan: free
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: warehouse-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRE_MINUTES
        value: "60"
    dockerCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT

databases:
  - name: warehouse-db
    plan: free
    databaseName: warehouse
    user: warehouse
